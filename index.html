<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U&D — University OS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter,sans-serif;
}

body{
  background:#050505;
  color:white;
  overflow-y:auto;
  overflow-x:hidden;
}

/* ================= INTRO ================= */

.intro{
  position:fixed;
  inset:0;
  width:100vw;
  height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle at center, #0a0a0a 0%, #000 80%);
  z-index:1000;
  animation:introExit 3.8s cubic-bezier(.77,0,.175,1) forwards;
  pointer-events:none;
}

.light{
  position:absolute;
  width:700px;
  height:700px;
  background:radial-gradient(circle, rgba(255,255,255,.14), transparent 65%);
  filter:blur(80px);
  animation:float 6s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translate(-25px,-20px)}
  50%{transform:translate(35px,25px)}
}

.logo{
  font-size:92px;
  letter-spacing:26px;
  font-weight:500;
  animation:logoIn 3s cubic-bezier(.16,1,.3,1) forwards;
}

.logo span{
  color:rgba(255,255,255,.35);
}

@keyframes logoIn{
  0%{
    opacity:0;
    transform:scale(2.2);
    filter:blur(35px);
  }
  45%{
    opacity:1;
    filter:blur(0);
  }
  100%{
    opacity:1;
    transform:scale(1);
  }
}

@keyframes introExit{
  0%{opacity:1}
  80%{opacity:1}
  100%{
    opacity:0;
    visibility:hidden;
    pointer-events:none;
  }
}

/* ================= MAIN ================= */

.main{
  padding:60px;
  opacity:1;
}

nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding-bottom:30px;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.brand{
  letter-spacing:6px;
}

.lang{
  cursor:pointer;
  color:rgba(255,255,255,.6);
}

[data-ru]{
  transition:opacity .25s ease;
}

.hero h1{
  font-size:72px;
  line-height:1.05;
  letter-spacing:-2px;
  max-width:1000px;
}

.hero p{
  margin-top:20px;
  max-width:900px;
  color:rgba(255,255,255,.6);
  line-height:1.6;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:24px;
  margin-top:60px;
}

.card{
  padding:22px;
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  background:rgba(255,255,255,.03);
  cursor:pointer;
  transition:.25s ease;
  overflow:hidden;
  position:relative;
}

.card:hover{
  border-color:rgba(255,255,255,.2);
}

.card-content{
  height:0;
  opacity:0;
  overflow:hidden;
  transform:translateY(-6px);
  transition:all .35s ease;
  margin-top:0;
  color:rgba(255,255,255,.65);
  line-height:1.6;
}

.card.open .card-content{
  opacity:1;
  margin-top:14px;
  transform:translateY(0);
}

.section{
  margin-top:80px;
}

.section h2{
  font-size:28px;
  margin-bottom:18px;
}

.text{
  color:rgba(255,255,255,.6);
  line-height:1.7;
  max-width:900px;
}

.news{
  display:grid;
  gap:12px;
}

.news-item{
  padding:16px;
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  background:rgba(255,255,255,.02);
  color:rgba(255,255,255,.6);
}

.cursor{
  position:fixed;
  width:260px;
  height:260px;
  background:radial-gradient(circle, rgba(255,255,255,.08), transparent 60%);
  pointer-events:none;
  transform:translate(-50%,-50%);
  mix-blend-mode:screen;
  z-index:2;
}

/* ================= TABLET ================= */

@media (max-width:1024px){

  .main{
    padding:40px 30px;
  }

  .hero h1{
    font-size:52px;
  }

  .hero p{
    font-size:16px;
  }

  .grid{
    grid-template-columns:1fr;
  }

  .logo{
    font-size:72px;
    letter-spacing:18px;
  }

  .light{
    width:500px;
    height:500px;
  }

  .cursor{
    display:none;
  }
}

/* ================= MOBILE ================= */

@media (max-width:768px){

  .main{
    padding:24px 18px 40px;
  }

  .brand{
    font-size:14px;
    letter-spacing:4px;
  }

  .lang{
    font-size:13px;
  }

  .hero{
    margin-top:30px;
  }

  .hero h1{
    font-size:34px;
    line-height:1.15;
    letter-spacing:-1px;
  }

  .hero p{
    font-size:14px;
    margin-top:16px;
  }

  .grid{
    grid-template-columns:1fr;
    gap:14px;
    margin-top:40px;
  }

  .card{
    padding:18px;
    font-size:15px;
  }

  .section{
    margin-top:50px;
  }

  .section h2{
    font-size:22px;
  }

  .text{
    font-size:14px;
  }

  .news-item{
    font-size:14px;
    padding:14px;
  }

  .logo{
    font-size:42px;
    letter-spacing:8px;
    text-align:center;
    width:100%;
    padding:0 16px;
  }

  .light{
    width:280px;
    height:280px;
    filter:blur(50px);
  }

  .cursor{
    display:none;
  }
}

/* ================= SMALL MOBILE ================= */

@media (max-width:420px){

  .logo{
    font-size:34px;
    letter-spacing:5px;
  }

  .light{
    width:220px;
    height:220px;
  }

  .hero h1{
    font-size:28px;
  }

  .hero p{
    font-size:13px;
  }
}

</style>
</head>

<body>

<div class="intro">
  <div class="light"></div>
  <div class="logo">U<span>&</span>D</div>
</div>

<div class="main">

<nav>
  <div class="brand">U&D</div>
  <div class="lang" onclick="toggleLang()">RU / EN</div>
</nav>

<div class="hero">
  <h1 data-ru="Университет дизайна как интеллектуальная система"
      data-en="Design University as an intelligent system"></h1>

  <p data-ru="U&D — образовательная среда, где дизайн, UX/UI и продуктовые системы изучаются через практику и реальные проекты."
     data-en="U&D is an educational environment where design, UX/UI and product systems are studied through real projects and practice."></p>
</div>

<div class="grid">

  <div class="card" onclick="toggleCard(this,'graphic')">
    <span data-ru="Графический дизайн" data-en="Graphic Design"></span>
    <div class="card-content"></div>
  </div>

  <div class="card" onclick="toggleCard(this,'ux')">
    <span data-ru="UX/UI дизайн" data-en="UX/UI Design"></span>
    <div class="card-content"></div>
  </div>

  <div class="card" onclick="toggleCard(this,'industrial')">
    <span data-ru="Промышленный дизайн" data-en="Industrial Design"></span>
    <div class="card-content"></div>
  </div>

</div>

<div class="section">

<h2 data-ru="Поддержка" data-en="Support"></h2>

<p class="text" data-ru="Телефон: +7 (495) 120-88-40" data-en="Phone: +7 (495) 120-88-40"></p>
<p class="text" data-ru="Email: support@ud-university.ru" data-en="Email: support@ud-university.ru"></p>
<p class="text" data-ru="Москва, м. Проспект Мира, Протопоповский переулок, 9с1"
data-en="Moscow, Prospekt Mira metro station, Protopopovsky Lane 9s1"></p>

</div>

<div class="section">

<h2 data-ru="Новости" data-en="News"></h2>

<div class="news">
<div class="news-item" data-ru="AI меняет дизайн-индустрию." data-en="AI is changing the design industry."></div>
<div class="news-item" data-ru="UX становится ключевой профессией." data-en="UX is becoming a key profession."></div>
<div class="news-item" data-ru="Университеты внедряют AI обучение." data-en="Universities adopt AI education."></div>
<div class="news-item" data-ru="Figma расширяет инструменты." data-en="Figma expands design tools."></div>
<div class="news-item" data-ru="Бизнес переходит на дизайн-мышление." data-en="Business adopts design thinking."></div>
<div class="news-item" data-ru="Креативная индустрия растёт." data-en="Creative industry is growing."></div>
</div>

</div>

</div>

<div class="cursor"></div>

<script>

const cursor=document.querySelector(".cursor");

document.addEventListener("mousemove",(e)=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});

let lang="ru";
let switching=false;

function renderLanguage(){
  document.querySelectorAll("[data-ru]").forEach(el=>{
    const t=el.getAttribute("data-"+lang);
    if(t) el.innerText=t;
  });
}

renderLanguage();

function toggleLang(){
  if(switching) return;
  switching=true;

  lang=(lang==="ru")?"en":"ru";

  document.querySelectorAll("[data-ru]").forEach(el=>{
    el.style.opacity=0;
  });

  setTimeout(()=>{
    renderLanguage();

    requestAnimationFrame(()=>{
      document.querySelectorAll("[data-ru]").forEach(el=>{
        el.style.opacity=1;
      });
      switching=false;
    });

  },180);
}

const data={
  graphic:{
    ru:{b:"Бакалавриат: брендинг и визуальные системы.",m:"Магистратура: арт-дирекшн.",t:"4+2 года"},
    en:{b:"Bachelor: branding and visual systems.",m:"Master: art direction.",t:"4+2 years"}
  },
  ux:{
    ru:{b:"UX/UI дизайн и продуктовые интерфейсы.",m:"Системный дизайн.",t:"4+2 года"},
    en:{b:"UX/UI and product interfaces.",m:"System design.",t:"4+2 years"}
  },
  industrial:{
    ru:{b:"Промышленный дизайн объектов.",m:"Индустриальные системы.",t:"4+2 года"},
    en:{b:"Industrial product design.",m:"Industrial systems.",t:"4+2 years"}
  }
};

function toggleCard(el,type){

  const isOpen=el.classList.contains("open");

  document.querySelectorAll(".card").forEach(c=>{
    c.classList.remove("open");
    c.querySelector(".card-content").style.height="0px";
  });

  if(isOpen) return;

  const d=data[type][lang];
  const content=el.querySelector(".card-content");

  content.innerHTML=`
    <div>${d.b}</div>
    <div style="margin-top:6px">${d.m}</div>
    <div style="margin-top:6px;color:rgba(255,255,255,.4)">${d.t}</div>
  `;

  el.classList.add("open");
  content.style.height=content.scrollHeight+"px";
}

</script>

</body>
</html>
